<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quarterly Smart Lineup Builder</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <header>
        <h1>Smart Lineup Builder</h1>
        <nav class="tabs">
            <button class="tab-btn active" data-target="manageView">명단 관리</button>
            <button class="tab-btn" data-target="boardView">작전판</button>
            <button class="tab-btn" data-target="historyView">기록</button>
            <button class="tab-btn" data-target="statsView">통계</button>
        </nav>
    </header>

    <main>
        <!-- View 1: Player Management -->
        <section id="manageView" class="view active">
            <!-- Team Selection Panel -->
            <div class="panel glass-panel" style="margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;">
                <div style="display: flex; align-items: center; gap: 8px; flex-grow: 1;">
                    <label style="font-weight: 800; font-size: 1.1rem; color: var(--accent-color);">🏆 관리 팀:</label>
                    <select id="teamSelector" style="width: auto; margin-bottom: 0; padding: 8px 12px; font-weight: bold; border-radius: 8px; font-size: 1rem; background: rgba(15, 23, 42, 0.8);">
                        <!-- JS populated -->
                    </select>
                    <button id="btnDeleteTeam" title="현재 팀 삭제" style="padding: 6px 10px; background: #7f1d1d; border: none; border-radius: 6px; color: white; cursor: pointer; font-size: 0.9rem; white-space: nowrap;">🗑️ 팀 삭제</button>
                </div>
                <div style="display: flex; align-items: center; gap: 5px;">
                    <input type="text" id="newTeamInput" placeholder="새로운 팀 이름" style="margin-bottom: 0; width: 140px; padding: 8px;">
                    <button id="btnAddTeam" class="btn-primary" style="padding: 8px 15px; margin: 0; width: auto; white-space: nowrap;">새 팀 추가</button>
                </div>
            </div>

            <div class="panel glass-panel">
                <h2>선수 등록</h2>
                <form id="addPlayerForm">
                    <div class="pos-select">
                        <input type="text" id="pName" placeholder="선수 이름" required>
                        <input type="number" id="pBackNumber" placeholder="등번호" required>
                    </div>
                    <div class="pos-select">
                        <select id="pPos1" required>
                            <option value="" disabled selected>1지망 포지션</option>
                            <option value="FW">포워드(ST)</option>
                            <option value="WF">윙포워드(LW/RW)</option>
                            <option value="CM">미드필더(CM)</option>
                            <option value="CDM">수비형 미드필더(CDM)</option>
                            <option value="CAM">공격형 미드필더(CAM)</option>
                            <option value="CB">센터백(CB)</option>
                            <option value="WB">윙백(WB/FB)</option>
                            <option value="GK">골키퍼(GK)</option>
                        </select>
                        <select id="pPos2" required>
                            <option value="" disabled selected>2지망 포지션</option>
                            <option value="none">없음</option>
                            <option value="FW">포워드(ST)</option>
                            <option value="WF">윙포워드(LW/RW)</option>
                            <option value="CM">미드필더(CM)</option>
                            <option value="CDM">수비형 미드필더(CDM)</option>
                            <option value="CAM">공격형 미드필더(CAM)</option>
                            <option value="CB">센터백(CB)</option>
                            <option value="WB">윙백(WB/FB)</option>
                            <option value="GK">골키퍼(GK)</option>
                        </select>
                    </div>

                    <button type="submit" class="btn-primary">추가하기</button>
                </form>
            </div>

            <div class="panel glass-panel">
                <div class="panel-header" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
                    <h2 style="margin:0;">참석자 명단 <span id="attendanceCounter" style="font-size: 0.9rem; color: var(--accent-color); margin-left: 10px;">(0명 선택됨)</span></h2>
                    <button id="btnDeselectAll" class="btn-primary" style="width:auto; padding:6px 12px; font-size:0.85rem; background:#475569;">전체 선택 해제</button>
                </div>
                <div class="instruction">
                    ✓: 참석 &nbsp; / &nbsp; ★: 핵심(3쿼터 이상 보장)
                </div>
                <ul id="playerList" class="player-list" style="margin-bottom: 20px;">
                    <!-- JS populated -->
                </ul>
                <div style="border-top: 1px solid var(--panel-border); padding-top: 15px;">
                    <h3>쿼터별 포메이션 선택</h3>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0;">
                        <div>
                            <label style="font-size: 0.85rem;">1쿼터</label>
                            <select id="preForm1"><option value="4231">4-2-3-1</option><option value="433">4-3-3</option><option value="352">3-5-2</option><option value="442">4-4-2</option></select>
                        </div>
                        <div>
                            <label style="font-size: 0.85rem;">2쿼터</label>
                            <select id="preForm2"><option value="4231">4-2-3-1</option><option value="433">4-3-3</option><option value="352">3-5-2</option><option value="442">4-4-2</option></select>
                        </div>
                        <div>
                            <label style="font-size: 0.85rem;">3쿼터</label>
                            <select id="preForm3"><option value="4231">4-2-3-1</option><option value="433">4-3-3</option><option value="352">3-5-2</option><option value="442">4-4-2</option></select>
                        </div>
                        <div>
                            <label style="font-size: 0.85rem;">4쿼터</label>
                            <select id="preForm4"><option value="4231">4-2-3-1</option><option value="433">4-3-3</option><option value="352">3-5-2</option><option value="442">4-4-2</option></select>
                        </div>
                    </div>
                    <button id="btnDistribute" class="btn-accent" style="width: 100%; margin-top: 10px;">쿼터 배분 시작</button>
                </div>
            </div>
        </section>

        <!-- View 2: Formation Board -->
        <section id="boardView" class="view">
            <!-- 경기 정보 패널 -->
            <div class="panel glass-panel" style="margin-bottom: 15px;">
                <div class="match-info-row">
                    <div class="match-info-field">
                        <label class="match-info-label">📅 날짜</label>
                        <input type="text" id="matchDate" class="match-info-input" placeholder="날짜 (예: 2026-04-25)">
                    </div>
                    <div class="match-info-field">
                        <label class="match-info-label">🆚 상대팀</label>
                        <input type="text" id="matchOpponent" class="match-info-input" placeholder="상대팀 이름">
                    </div>
                </div>
            </div>

            <div class="panel glass-panel">
                <h2>오늘의 출전 명단</h2>
                <div id="masterList" style="display:flex; flex-wrap:wrap; gap:8px;">
                    <!-- JS populated -->
                </div>
            </div>

            <div id="captureArea" class="board-grid">
                <!-- JS populated 4 quarters -->
            </div>

            <div class="export-actions panel glass-panel">
                <!-- 포메이션 저장/불러오기 -->
                <div class="formation-save-section">
                    <h3 class="formation-save-title">📁 포메이션 저장 / 불러오기</h3>
                    <div class="formation-save-row">
                        <input type="text" id="formationSaveName" placeholder="저장 이름 입력 (예: 4쿼터 수비형)" class="formation-save-input">
                        <button id="btnSaveFormation" class="btn-save-formation">💾 저장</button>
                    </div>
                    <div id="savedFormationList" class="saved-formation-list">
                        <!-- JS populated -->
                    </div>
                </div>
                <button id="btnSaveImage" class="btn-accent" style="width:100%; margin-top:10px;">★ 전체 작전판 이미지 저장 (공유용) ★</button>
                <div style="margin-top:10px;">
                    <button id="btnSaveData" class="btn-primary" style="width:100%;">데이터베이스에 전체 저장</button>
                </div>
            </div>
        </section>

        <!-- View 3: History -->
        <section id="historyView" class="view">
            <div class="panel glass-panel" style="margin-bottom: 20px;">
                <h2>기록 입력</h2>
                <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:8px; display:flex; flex-direction:column; gap:10px;">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <select id="recordMatchSelect" style="width:100%; margin-bottom:0; padding:8px; font-weight:bold; font-size:1.1rem; color:var(--accent-color); background:transparent; border:1px solid var(--panel-border);">
                            <!-- JS populated -->
                        </select>
                        <select id="recordResultSelect" style="width:auto; margin-bottom:0; padding:8px; margin-left:10px; flex-shrink:0;">
                            <option value="">결과 선택</option>
                            <option value="승">승리</option>
                            <option value="무">무승부</option>
                            <option value="패">패배</option>
                        </select>
                    </div>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="recordMemoInput" placeholder="경기 메모 (예: 매너 굿, 부상자 다수)" style="margin-bottom:0; flex-grow:1;">
                        <button id="btnSaveRecord" class="btn-primary" style="width:auto; padding: 0 20px; white-space:nowrap;">저장</button>
                    </div>
                </div>
            </div>
            
            <div class="panel glass-panel">
                <h2 style="color: white; font-weight: bold;">경기기록</h2>
                <div id="matchRecordList" style="display:flex; flex-direction:column; gap:10px; margin-top:15px;">
                    <!-- JS populated -->
                </div>
            </div>
        </section>

        <!-- View 4: Stats -->
        <section id="statsView" class="view">
            <div class="panel glass-panel">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h2 style="margin:0;">선수 통계</h2>
                    <button id="btnDeleteAllStats" class="btn-delete-all">🗑️ 전체 기록 일괄삭제</button>
                </div>
                <div id="statsGrid" class="stats-grid">
                    <!-- JS populated -->
                </div>
            </div>
        </section>
    </main>

    <!-- Match Board Modal -->
    <div id="matchBoardModal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalMatchTitle">경기 작전판</h2>
                <button id="btnModalClose" class="btn-close">&times;</button>
            </div>
            <div id="modalCaptureArea" class="board-grid">
                <!-- JS populated 4 quarters for modal -->
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
